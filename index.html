<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joyeux Anniversaire !</title>	    
    <link type="text/css" rel="stylesheet" href="file/default.css">
    <script type="text/javascript" src="file/jquery.min.js"></script>
    <script type="text/javascript" src="file/jscex.min.js"></script>
    <script type="text/javascript" src="file/jscex-parser.js"></script>
    <script type="text/javascript" src="file/jscex-jit.js"></script>
    <script type="text/javascript" src="file/jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="file/jscex-async.min.js"></script>
    <script type="text/javascript" src="file/jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="file/function.js" charset="utf-8"></script>
    <script type="text/javascript" src="file/love.js" charset="utf-8"></script>
    <script>
        function playAudio() {
            var audio = document.getElementById("myAudio");
            audio.play();
        }
    </script>
</head>
<body>
    <div id="main">
        <div id="error"><a href="http://www.google.cn/chrome/intl/zh-CN/landing_chrome.html?hl=zh-CN&brand=CHMI">Chrome</a> (<a href="http://firefox.com.cn/download/">Firefox</a>)</div>
        <audio autoplay="autoplay" height="100" width="100" id="myAudio">
            <source src="aud.mp3" type="audio/mp3" />
            <embed height="100" width="100" src="aud.mp3" />
        </audio>
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say">Salut Orokia 🎉</span><br>
                    <span class="say">Joyeux Anniversaire 🎈</span><br>
                    <span class="say">Que Dieu te bénisse 🍀</span><br>
                    <span class="say">Je te souhaite un bonheur infini 💕</span><br>
                    <span class="say">T'es vraiment une amie incroyable ❤️</span><br>
                    <span class="say">Tellement reconnaissant de t'avoir dans ma vie 🌟</span><br>
                    <span class="say">Passe la meilleure journée Orokia 🎉🥳</span><br>
                </div>
            </div>

            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
    </div>

    <script>
    (function() {
        var canvas = $('#canvas');
        var wrap = $('#wrap');
        var textDiv = $('#text');
        var clockBox = $('#clock-box');
        var messageBox = $('#message-box');
        var scaleFactor = 1;

        if (!canvas[0].getContext) {
            $("#error").show();
            return false;
        }

        function resizeDisplay() {
            var maxW = Math.min(window.innerWidth * 0.98, 1100);
            scaleFactor = maxW / 1100;
            canvas.css({ width: maxW + "px", height: (680 * s) + "px" });
            wrap.css({ width: maxW + "px", height: (680 * s) + "px" });
            textDiv.css({ left: (188 * s) + "px", top: (80 * s) + "px", width: (272 * s) + "px" });
            $(".say").css("font-size", (16 * s) + "px");
            if (clockBox.length) clockBox.css({ left: (60 * s) + "px", top: (550 * s) + "px" });
            if (messageBox.length) messageBox.css({ marginTop: (450 * s) + "px", fontSize: (25 * s) + "px" });
        }

        canvas.attr("width", 1100);
        canvas.attr("height", 680);
        resizeDisplay();
        $(window).on("resize", resizeDisplay);

        var width = 1100;
        var height = 680;

        var opts = {
            seed: {
                x: width / 2 - 20,
                color: "rgb(190, 26, 37)",
                scale: 2
            },
            branch: [
                [535, 680, 570, 250, 500, 200, 30, 100, [
                    [540, 500, 455, 417, 340, 400, 13, 100, [
                        [450, 435, 434, 430, 394, 395, 2, 40]
                    ]],
                    [550, 445, 600, 356, 680, 345, 12, 100, [
                        [578, 400, 648, 409, 661, 426, 3, 80]
                    ]],
                    [539, 281, 537, 248, 534, 217, 3, 40],
                    [546, 397, 413, 247, 328, 244, 9, 80, [
                        [427, 286, 383, 253, 371, 205, 2, 40],
                        [498, 345, 435, 315, 395, 330, 4, 60]
                    ]],
                    [546, 357, 608, 252, 678, 221, 6, 100, [
                        [590, 293, 646, 277, 648, 271, 2, 80]
                    ]]
                ]] 
            ],
            bloom: {
                num: 700,
                width: 1080,
                height: 650,
            },
            footer: {
                width: 1200,
                height: 5,
                speed: 10,
            }
        }

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        function getPos(e) {
            var offset = canvas.offset();
            if (e.originalEvent && e.originalEvent.touches) {
                var touch = e.originalEvent.touches[0] || e.originalEvent.changedTouches[0];
                return { x: touch.pageX - offset.left, y: touch.pageY - offset.top };
            }
            return { x: e.pageX - offset.left, y: e.pageY - offset.top };
        }

        canvas.on("click touchstart", function(e) {
            e.preventDefault();
            playAudio();
            var pos = getPos(e);
            if (seed.hover(pos.x / scaleFactor, pos.y / scaleFactor)) {
                hold = 0;
                canvas.off("click touchstart");
                canvas.off("mousemove touchmove");
                canvas.removeClass('hand');
            }
        });

        canvas.on("mousemove touchmove", function(e) {
            var pos = getPos(e);
            canvas.toggleClass('hand', seed.hover(pos.x / scaleFactor, pos.y / scaleFactor));
        });

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) {
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canScale()) {
                seed.scale(0.95);
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canMove()) {
                seed.move(0, 2);
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.grow();
                $await(Jscex.Async.sleep(10));
            } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.flower(2);
                $await(Jscex.Async.sleep(10));
            } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            tree.snapshot("p1", 240, 0, 610, 680);
            while (tree.move("p1", 500, 0)) {
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
            foot.draw();
            tree.snapshot("p2", 500, 0, 610, 680);

            canvas.parent().css("background", "url(" + tree.toDataURL('image/png') + ")");
            canvas.css("background", "#ffe");
            $await(Jscex.Async.sleep(300));
            canvas.css("background", "none");
        }));

        var textAnimate = eval(Jscex.compile("async", function () {
            $("#code").show().typewriter();
        }));
	    
        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());
            textAnimate().start();
        }));

        runAsync().start();
    })();
    </script>
</body>
</html>
